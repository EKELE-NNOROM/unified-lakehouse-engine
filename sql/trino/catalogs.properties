# Trino catalog definitions — mount in Trino coordinator /etc/trino/catalog/

# iceberg.properties
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.file-format=PARQUET
hive.s3.path-style-access=true

# starrocks.properties
connector.name=mysql
connection-url=jdbc:mysql://starrocks-fe:9030
connection-user=root
connection-password=

# redshift.properties
connector.name=redshift
connection-url=jdbc:redshift://your-cluster.region.redshift.amazonaws.com:5439/analytics
connection-user=admin
connection-password=

# tidb.properties
connector.name=mysql
connection-url=jdbc:mysql://tidb:4000/analytics
connection-user=root
connection-password=
